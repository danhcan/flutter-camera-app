name: camera_app_ip
description: "Flutter app to view live stream from multiple RTSP/ONVIF cameras with Firebase backend."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0

  # State Management
  provider: ^6.0.0

  # Video/RTSP Streaming
  flutter_vlc_player: ^7.4.0
  chewie: ^1.7.0
  video_player: ^2.8.0

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
